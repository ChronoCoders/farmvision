{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Farm Vision - Şifre Sıfırlama</title>
    <link rel="shortcut icon" type="image/png" href="{% static 'favicon.ico' %}"/>
    <link rel="stylesheet" href="{% static 'assets/styles/style.min.css' %}">
    <link href="{% static 'fontawesomefree/css/fontawesome.css' %}" rel="stylesheet">
    <link href="{% static 'fontawesomefree/css/solid.css' %}" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        .auth-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #fff; border-radius: 8px; box-shadow: 0 2px 16px rgba(0,0,0,0.10); padding: 40px 36px 32px; width: 100%; max-width: 400px; }
        .auth-logo { text-align: center; margin-bottom: 24px; }
        .auth-logo h2 { color: #2E7D32; font-weight: 700; margin: 0; }
        .auth-logo p { color: #757575; margin: 4px 0 0; font-size: 13px; }
        .btn-auth { background: #2E7D32; border-color: #2E7D32; color: #fff; width: 100%; padding: 10px; font-size: 15px; border-radius: 4px; }
        .btn-auth:hover { background: #1b5e20; color: #fff; }
        .auth-footer { text-align: center; margin-top: 20px; font-size: 13px; }
        .auth-footer a { color: #2E7D32; }
    </style>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <h2><i class="fas fa-lock"></i> Şifre Sıfırla</h2>
            <p>E-posta adresinizi girin, sıfırlama bağlantısı gönderelim.</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_email">E-posta Adresi</label>
                <input type="email" name="email" id="id_email" class="form-control" required autofocus>
            </div>
            <button type="submit" class="btn btn-auth">Sıfırlama Bağlantısı Gönder</button>
        </form>
        <div class="auth-footer"><a href="{% url 'login' %}">← Giriş sayfasına dön</a></div>
    </div>
</div>
<script src="{% static 'assets/scripts/jquery.min.js' %}"></script>
<script src="{% static 'assets/plugin/bootstrap/js/bootstrap.min.js' %}"></script>
</body>
</html>
