{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Farm Vision - Giriş</title>
    <link rel="shortcut icon" type="image/png" href="{% static 'favicon.ico' %}"/>
    <link rel="stylesheet" href="{% static 'assets/styles/style.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/styles/custom.css' %}">
    <link href="{% static 'fontawesomefree/css/fontawesome.css' %}" rel="stylesheet">
    <link href="{% static 'fontawesomefree/css/solid.css' %}" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.10);
            padding: 40px 36px 32px;
            width: 100%;
            max-width: 400px;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .auth-logo h2 {
            color: #2E7D32;
            font-weight: 700;
            margin: 0;
        }
        .auth-logo p { color: #757575; margin: 4px 0 0; font-size: 13px; }
        .auth-card .form-control { border-radius: 4px; }
        .btn-auth {
            background: #2E7D32;
            border-color: #2E7D32;
            color: #fff;
            width: 100%;
            padding: 10px;
            font-size: 15px;
            border-radius: 4px;
        }
        .btn-auth:hover { background: #1b5e20; border-color: #1b5e20; color: #fff; }
        .auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: #757575; }
        .auth-footer a { color: #2E7D32; }
        .errorlist { color: #c62828; list-style: none; padding: 0; font-size: 13px; }
    </style>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <h2><i class="fas fa-leaf"></i> Farm Vision</h2>
            <p>Yapay Zeka Tarım Sistemi</p>
        </div>

        {% if form.errors %}
        <div class="alert alert-danger">
            Kullanıcı adı veya şifre hatalı. Lütfen tekrar deneyin.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            <div class="form-group">
                <label for="id_username">Kullanıcı Adı</label>
                <input type="text" name="username" id="id_username"
                       class="form-control" autofocus autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="id_password">Şifre</label>
                <input type="password" name="password" id="id_password"
                       class="form-control" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-auth">Giriş Yap</button>
        </form>

        <div class="auth-footer">
            <a href="{% url 'password_reset' %}">Şifremi unuttum</a>
            &nbsp;·&nbsp;
            <a href="{% url 'register' %}">Hesap oluştur</a>
        </div>
    </div>
</div>
<script src="{% static 'assets/scripts/jquery.min.js' %}"></script>
<script src="{% static 'assets/plugin/bootstrap/js/bootstrap.min.js' %}"></script>
</body>
</html>
