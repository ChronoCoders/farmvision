{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Farm Vision - E-posta Gönderildi</title>
    <link rel="shortcut icon" type="image/png" href="{% static 'favicon.ico' %}"/>
    <link rel="stylesheet" href="{% static 'assets/styles/style.min.css' %}">
    <link href="{% static 'fontawesomefree/css/fontawesome.css' %}" rel="stylesheet">
    <link href="{% static 'fontawesomefree/css/solid.css' %}" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        .auth-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #fff; border-radius: 8px; box-shadow: 0 2px 16px rgba(0,0,0,0.10); padding: 40px 36px 32px; width: 100%; max-width: 400px; text-align: center; }
        .auth-card .icon { font-size: 48px; color: #2E7D32; margin-bottom: 16px; }
        .auth-card h3 { color: #2E7D32; }
        .auth-footer { margin-top: 20px; font-size: 13px; }
        .auth-footer a { color: #2E7D32; }
    </style>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="icon"><i class="fas fa-envelope-open-text"></i></div>
        <h3>E-posta Gönderildi</h3>
        <p>Şifre sıfırlama bağlantısı e-posta adresinize gönderildi. Lütfen gelen kutunuzu kontrol edin.</p>
        <div class="auth-footer"><a href="{% url 'login' %}">← Giriş sayfasına dön</a></div>
    </div>
</div>
</body>
</html>
