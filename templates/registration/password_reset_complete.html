{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Farm Vision - Şifre Güncellendi</title>
    <link rel="shortcut icon" type="image/png" href="{% static 'favicon.ico' %}"/>
    <link rel="stylesheet" href="{% static 'assets/styles/style.min.css' %}">
    <link href="{% static 'fontawesomefree/css/fontawesome.css' %}" rel="stylesheet">
    <link href="{% static 'fontawesomefree/css/solid.css' %}" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        .auth-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #fff; border-radius: 8px; box-shadow: 0 2px 16px rgba(0,0,0,0.10); padding: 40px 36px 32px; width: 100%; max-width: 400px; text-align: center; }
        .auth-card .icon { font-size: 48px; color: #2E7D32; margin-bottom: 16px; }
        .auth-card h3 { color: #2E7D32; }
        .btn-auth { display: inline-block; background: #2E7D32; color: #fff; padding: 10px 24px; border-radius: 4px; text-decoration: none; margin-top: 16px; }
        .btn-auth:hover { background: #1b5e20; color: #fff; text-decoration: none; }
    </style>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="icon"><i class="fas fa-check-circle"></i></div>
        <h3>Şifreniz Güncellendi</h3>
        <p>Yeni şifreniz başarıyla kaydedildi. Artık giriş yapabilirsiniz.</p>
        <a href="{% url 'login' %}" class="btn-auth">Giriş Yap</a>
    </div>
</div>
</body>
</html>
